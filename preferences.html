<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Alerts — Space Sentinel</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23050A12'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%2300C0FF'%3E%E2%97%88%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --c:#00C0FF; --g:#00E890; --h:#FF5C1A;
    --t1:#B8D8F8; --t2:#3A6080; --read:#9CC4E8;
    --card:#0A1422; --b1:#0C1E38; --b2:#162840;
  }
  body { margin:0; background:#050A12; color:var(--t1); font-family:'Space Mono',monospace;
         display:flex; align-items:flex-start; justify-content:center; min-height:100vh; padding:40px 16px; }
  .wrap { background:#070D1A; border:1px solid var(--b1); padding:32px 36px; max-width:520px; width:100%; }
  .brand { font-family:'Orbitron',sans-serif; font-size:16px; color:var(--c); letter-spacing:4px; margin-bottom:6px; text-align:center; }
  .sub { font-size:9px; color:var(--t2); letter-spacing:3px; margin-bottom:28px; text-align:center; }
  .detail-field { display:flex; flex-direction:column; gap:6px; }
  .df-label { font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:2px; color:var(--t2); }
  .detail-link { display:block; background:none; border:1px solid var(--c); color:var(--c);
                 font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:2px;
                 padding:12px; text-decoration:none; transition:background .15s; }
  .detail-link:hover { background:rgba(0,192,255,.1); }
  .filter-btn { background:none; border:1px solid var(--h); color:var(--h);
                font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:2px;
                padding:12px 18px; cursor:pointer; }
  .filter-btn:hover { background:rgba(255,92,26,.1); }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">◈ SPACE SENTINEL</div>
  <div class="sub">MANAGE YOUR ALERTS</div>
  <div id="prefsRoot"></div>
</div>

<script>
const CONFIG = {
  SUPABASE_URL:      'REPLACE_WITH_YOUR_SUPABASE_URL',
  SUPABASE_ANON_KEY: 'REPLACE_WITH_YOUR_ANON_KEY',
};

(async function init() {
  const token = new URLSearchParams(location.search).get('token');
  const root = document.getElementById('prefsRoot');
  if (!token) {
    root.innerHTML = '<div style="color:var(--h)">No token found in the URL. Please use the "manage preferences" link from any Space Sentinel alert email.</div>';
    return;
  }
  root.innerHTML = '<div style="color:var(--t2)">Loading your preferences…</div>';
  try {
    const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/rpc/get_subscriber_by_token`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey':CONFIG.SUPABASE_ANON_KEY, 'Authorization':`Bearer ${CONFIG.SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ p_token: token }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();
    const sub = Array.isArray(rows) ? rows[0] : rows;
    if (!sub) {
      root.innerHTML = '<div style="color:var(--h)">This management link is invalid, or the subscription has been unsubscribed.</div>';
      return;
    }
    const t = sub.thresholds || {};
    root.innerHTML = `
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);margin-bottom:20px">
        Managing preferences for <strong style="color:var(--t1)">${sub.email}</strong>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="detail-field"><div class="df-label">MINIMUM VISIBILITY (ASTEROIDS &amp; COMETS)</div>
          <select id="pTier" style="background:var(--card);border:1px solid var(--b2);color:var(--t1);font-family:'Space Mono',monospace;font-size:11px;padding:9px 12px;width:100%;appearance:none">
            <option value="naked_eye">Naked eye</option>
            <option value="binoculars">Binoculars or better</option>
            <option value="telescope">Backyard telescope or better</option>
            <option value="any">Any tracked object</option>
          </select></div>
        <div class="detail-field"><div class="df-label">ALERT ME ABOUT</div>
          <div style="display:flex;flex-direction:column;gap:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--read)">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="pAst"> Asteroids</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="pCom"> Comets</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="pMet"> Meteor showers</label>
          </div></div>
        <div class="detail-field" id="pHemiField"><div class="df-label">METEOR SHOWER HEMISPHERE</div>
          <select id="pHemi" style="background:var(--card);border:1px solid var(--b2);color:var(--t1);font-family:'Space Mono',monospace;font-size:11px;padding:9px 12px;width:100%;appearance:none">
            <option value="both">Both — send me all showers</option>
            <option value="N">Northern hemisphere only</option>
            <option value="S">Southern hemisphere only</option>
          </select></div>
        <div class="detail-field"><div class="df-label">REMINDER WINDOWS</div>
          <div style="display:flex;flex-direction:column;gap:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--read)">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="p30d"> 30-day heads-up</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="p7d"> 7-day reminder</label>
          </div>
          <div style="font-size:9px;color:var(--t2);margin-top:4px">Uncheck both to only receive first-sighting digests.</div></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:24px">
        <button class="detail-link" style="cursor:pointer;flex:1;text-align:center" onclick="savePreferences()">SAVE →</button>
        <button class="filter-btn" onclick="unsubscribeMe()">UNSUBSCRIBE</button>
      </div>
      <div id="prefsMsg" style="font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);margin-top:14px;display:none"></div>
      <div style="margin-top:24px;text-align:center;font-size:9px"><a href="/" style="color:var(--t2)">← Back to Space Sentinel</a></div>`;
    document.getElementById('pTier').value  = t.visibility_tier || 'telescope';
    document.getElementById('pAst').checked = t.include_asteroids !== false;
    document.getElementById('pCom').checked = t.include_comets !== false;
    document.getElementById('pMet').checked = t.include_meteors !== false;
    document.getElementById('pHemi').value  = t.meteor_hemisphere || 'both';
    document.getElementById('p30d').checked = t.reminders_30d !== false;
    document.getElementById('p7d').checked  = t.reminders_7d !== false;
    const metBox = document.getElementById('pMet'), hemiField = document.getElementById('pHemiField');
    const sync = () => { hemiField.style.display = metBox.checked ? '' : 'none'; };
    metBox.addEventListener('change', sync); sync();
    window._token = token;
  } catch (err) {
    root.innerHTML = `<div style="color:var(--h)">Could not load preferences: ${err.message}</div>`;
  }
})();

async function savePreferences() {
  const msg = document.getElementById('prefsMsg');
  const payload = {
    p_token: window._token,
    p_thresholds: {
      visibility_tier:   document.getElementById('pTier').value,
      include_asteroids: document.getElementById('pAst').checked,
      include_comets:    document.getElementById('pCom').checked,
      include_meteors:   document.getElementById('pMet').checked,
      meteor_hemisphere: document.getElementById('pHemi').value,
      reminders_30d:     document.getElementById('p30d').checked,
      reminders_7d:      document.getElementById('p7d').checked,
      max_dist_ld:       null,
      min_diameter_m:    null,
    },
  };
  msg.style.display = 'block'; msg.style.color = 'var(--t2)'; msg.textContent = 'Saving…';
  try {
    const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/rpc/update_subscriber_thresholds`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey':CONFIG.SUPABASE_ANON_KEY, 'Authorization':`Bearer ${CONFIG.SUPABASE_ANON_KEY}` },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const ok = await res.json();
    if (ok) { msg.textContent = '✓ Preferences saved.'; msg.style.color = 'var(--g)'; }
    else    { msg.textContent = '⚠ Save failed — this token may no longer be valid.'; msg.style.color = 'var(--h)'; }
  } catch (err) {
    msg.textContent = `⚠ Save failed: ${err.message}`; msg.style.color = 'var(--h)';
  }
}
async function unsubscribeMe() {
  if (!confirm('Unsubscribe from all Space Sentinel alerts? You can re-subscribe any time.')) return;
  const msg = document.getElementById('prefsMsg');
  try {
    const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/rpc/unsubscribe_by_token`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey':CONFIG.SUPABASE_ANON_KEY, 'Authorization':`Bearer ${CONFIG.SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ p_token: window._token }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    msg.style.display = 'block'; msg.textContent = '✓ Unsubscribed. You won\u2019t receive further emails from Space Sentinel.'; msg.style.color = 'var(--g)';
  } catch (err) {
    msg.style.display = 'block'; msg.textContent = `⚠ Failed: ${err.message}`; msg.style.color = 'var(--h)';
  }
}
</script>
</body>
</html>
