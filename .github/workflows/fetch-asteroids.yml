name: Fetch Asteroid Data

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch asteroid data from NASA NeoWs
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python scripts/fetch_asteroids.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/asteroids.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update asteroid data ($(date -u +%Y-%m-%dT%H:%M)Z)"
            git push
          fi
