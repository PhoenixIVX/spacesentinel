name: Fetch Close-Call Data

on:
  schedule:
    - cron: '0 6 * * 0' 
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch close-call data from JPL
        run: python scripts/fetch_close_calls.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/close-calls-events.json data/orbital-elements.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update close-call data ($(date -u +%Y-%m-%d))"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              git push && break || {
                [ $attempt -eq 3 ] && echo "Push failed after 3 attempts" && exit 1
                sleep $((attempt * 10))
              }
            done
          fi
